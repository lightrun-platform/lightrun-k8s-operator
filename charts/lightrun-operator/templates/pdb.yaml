{{- if .Values.controllerManager.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "chart.fullname" . }}-controller-manager
  labels:
  {{- include "chart.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "chart.selectorLabels" . | nindent 6 }}
  {{- if .Values.controllerManager.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.controllerManager.podDisruptionBudget.minAvailable }}
  {{- else if .Values.controllerManager.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.controllerManager.podDisruptionBudget.maxUnavailable }}
  {{- else }}
  {{- fail "podDisruptionBudget is enabled but neither minAvailable nor maxUnavailable is set" }}
  {{- end }}
{{- end }}
